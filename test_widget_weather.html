<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Weather Test</title>

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
    }
    .weather-card {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      width: 250px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      border-left: 5px solid #4e73df;
    }
    .weather-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .weather-location {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .weather-temp {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

  <div class="weather-card">
    <div id="weather-icon" class="fas fa-cloud-sun weather-icon"></div>
    <div id="weather-location">Cape Breton</div>
    <div id="weather-temp">--°C</div>
    <div id="weather-desc">Loading...</div>
  </div>

  <script>
    // Simple version: fixed location to always work locally
    const apiKey = '1a4729661ed481f1edaaa70163bec80a';
    const lat = 46.2445;  // Cape Breton
    const lon = -60.1490;

    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`;

    fetch(url)
      .then(res => res.json())
      .then(data => {
        document.getElementById('weather-location').textContent = data.name;
        document.getElementById('weather-temp').textContent = Math.round(data.main.temp) + '°C';
        document.getElementById('weather-desc').textContent = data.weather[0].description;

        const iconEl = document.getElementById('weather-icon');
        const w = data.weather[0].main.toLowerCase();
        if (w.includes('cloud')) iconEl.className = 'fas fa-cloud weather-icon';
        else if (w.includes('rain')) iconEl.className = 'fas fa-cloud-showers-heavy weather-icon';
        else if (w.includes('snow')) iconEl.className = 'fas fa-snowflake weather-icon';
        else if (w.includes('sun') || w.includes('clear')) iconEl.className = 'fas fa-sun weather-icon';
        else iconEl.className = 'fas fa-smog weather-icon';
      })
      .catch(err => {
        console.error('Failed to fetch weather:', err);
        document.getElementById('weather-temp').textContent = '--°C';
        document.getElementById('weather-desc').textContent = 'Error';
      });
  </script>

</body>
</html>
